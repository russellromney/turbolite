[package]
name = "turbolite"
version = "0.4.1"
edition = "2021"
description = "turbolite - SQLite VFS with sub-50ms cold queries from S3 + page-level compression and encryption"
license = "Apache-2.0"
repository = "https://github.com/russellromney/turbolite"
keywords = ["sqlite", "compression", "encryption", "vfs", "zstd"]
categories = ["database", "compression"]

[lib]
crate-type = ["lib", "cdylib"]

[features]
default = ["zstd", "bundled-sqlite", "cloud"]
bundled-sqlite = ["dep:rusqlite", "rusqlite/bundled", "dep:libsqlite3-sys"]
loadable-extension = []
zstd = ["dep:zstd"]
lz4 = ["dep:lz4_flex"]
snappy = ["dep:snap"]
gzip = ["dep:flate2"]
encryption = ["dep:aes-gcm", "dep:aes", "dep:ctr", "dep:sha2", "dep:rand"]
parallel = []
cloud = ["dep:aws-sdk-s3", "dep:aws-config", "dep:aws-smithy-runtime", "dep:crc32fast"]
# Backward compat alias
tiered = ["cloud"]
wal = ["cloud", "dep:walrust-core", "dep:hadb-io", "dep:async-trait"]
lambda = ["dep:lambda_runtime", "cloud", "zstd"]

[dependencies]
sqlite-vfs = { git = "https://github.com/russellromney/sqlite-vfs.git", branch = "fix/shm-barrier-wal-push" }
zstd = { version = "0.13", optional = true }
lz4_flex = { version = "0.11", optional = true }
snap = { version = "1.1", optional = true }
flate2 = { version = "1.0", optional = true }
thiserror = "1"
parking_lot = "0.12"
flume = "0.11"
arc-swap = "1"
fs2 = "0.4"
file-guard = "0.2"
once_cell = "1"

# Encryption (optional)
aes-gcm = { version = "0.10", optional = true }
aes = { version = "0.8", optional = true }
ctr = { version = "0.9", optional = true }
sha2 = { version = "0.10", optional = true }
rand = { version = "0.8", optional = true }

# Parallel compression (optional)
rayon = "1.10"

# Tiered S3 storage (optional)
aws-sdk-s3 = { version = "1", optional = true }
aws-config = { version = "1", features = ["behavior-version-latest"], optional = true }
aws-smithy-runtime = { version = "1", features = ["client"], optional = true }
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time"] }
crc32fast = { version = "1", optional = true }
libc = "0.2"

# CLI dependencies
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4"
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.35", features = ["backup"], optional = true }
libsqlite3-sys = { version = "0.33", features = ["bundled"], optional = true }
tempfile = "3"
ureq = "2"
rustyline = "15"
atty = "0.2"
lambda_runtime = { version = "0.13", optional = true }

# WAL replication via walrust (optional)
walrust-core = { version = "0.5", optional = true, package = "walrust" }
hadb-io = { version = "0.4", optional = true }
async-trait = { version = "0.1", optional = true }

rmp-serde = "1.3.1"

# HTTP storage client
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

[build-dependencies]
cbindgen = "0.27"
cc = "1"

[dev-dependencies]
rayon = "1.10"
rmp-serde = "1.3.1"
proptest = "1.5"
proptest-derive = "0.5"
arbitrary = { version = "1.3", features = ["derive"] }

[[bin]]
name = "turbolite"
path = "bin/turbolite.rs"

[[bin]]
name = "turbolite-bench"
path = "benchmark/turbolite-bench.rs"

[[bin]]
name = "tiered-bench"
path = "benchmark/tiered-bench.rs"
required-features = ["tiered"]

[[bin]]
name = "tpch-bench"
path = "benchmark/tpch-bench.rs"
required-features = ["tiered", "zstd"]

[[bin]]
name = "tiered-bench-lambda"
path = "benchmark/tiered-bench-lambda.rs"
required-features = ["lambda"]

[[bin]]
name = "write-bench"
path = "benchmark/write-bench.rs"
required-features = ["tiered", "zstd"]

[[bin]]
name = "bench-validate"
path = "benchmark/bench-validate.rs"
required-features = ["tiered", "zstd"]

[[bin]]
name = "tiered-tune"
path = "benchmark/tiered-tune.rs"
required-features = ["tiered"]

[[example]]
name = "quick-bench"
path = "benchmark/quick-bench.rs"
required-features = ["encryption"]
