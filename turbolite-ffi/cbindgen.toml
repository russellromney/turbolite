language = "C"
header = """
/* turbolite — SQLite VFS with compression, encryption, and S3 tiered storage.
 *
 * Auto-generated by cbindgen. Do not edit manually.
 * https://github.com/russellromney/turbolite
 */
"""
include_guard = "TURBOLITE_H"
style = "both"
cpp_compat = true

[export]
prefix = ""
include = []
exclude = []

[export.rename]

[fn]
rename_args = "None"

[enum]
rename_variants = "ScreamingSnakeCase"

[defines]
"feature = encryption" = "TURBOLITE_ENCRYPTION"
"feature = cli-s3" = "TURBOLITE_CLOUD"
"feature = loadable-extension" = "TURBOLITE_LOADABLE_EXTENSION"

[parse]
parse_deps = false
extra_bindings = []

[parse.expand]
# Expand feature-gated items
features = ["encryption", "cli-s3"]
