name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build loadable extension for all platforms ──────────────────
  build-ext:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: so
            cross: true
          - os: macos-13
            target: x86_64-apple-darwin
            ext: dylib
          - os: macos-14
            target: aarch64-apple-darwin
            ext: dylib

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libclang (sqlite-plugin bindgen)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y llvm-dev libclang-dev clang
          else
            echo "LIBCLANG_PATH=$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib" >> "$GITHUB_ENV"
          fi

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build loadable extension
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: |
          cargo build --release --lib --target ${{ matrix.target }} \
            --no-default-features --features loadable-extension,zstd,cloud,wal

      - name: Build CLI binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
        run: |
          cargo build --release --bin turbolite --target ${{ matrix.target }} \
            --features cloud,zstd,bundled-sqlite,wal

      - name: Package extension artifact
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/libturbolite.${{ matrix.ext }} \
            artifacts/turbolite-${{ matrix.target }}.${{ matrix.ext }}
          cp target/${{ matrix.target }}/release/turbolite \
            artifacts/turbolite-cli-${{ matrix.target }}
          chmod +x artifacts/turbolite-cli-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ext-${{ matrix.target }}
          path: artifacts/

  # ── Python wheels ───────────────────────────────────────────────
  python-build:
    needs: build-ext
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            plat-name: manylinux2014_x86_64
            ext: so
          - target: aarch64-unknown-linux-gnu
            plat-name: manylinux2014_aarch64
            ext: so
          - target: x86_64-apple-darwin
            plat-name: macosx_13_0_x86_64
            ext: dylib
          - target: aarch64-apple-darwin
            plat-name: macosx_14_0_arm64
            ext: dylib

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ext-${{ matrix.target }}
          path: artifacts

      - name: Copy extension and CLI into Python package
        run: |
          cp artifacts/turbolite-${{ matrix.target }}.${{ matrix.ext }} \
            packages/python/turbolite/turbolite.${{ matrix.ext }}
          cp artifacts/turbolite-cli-${{ matrix.target }} \
            packages/python/turbolite/turbolite
          chmod +x packages/python/turbolite/turbolite

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install setuptools wheel
          cd packages/python
          python setup.py bdist_wheel --plat-name ${{ matrix.plat-name }}

      - uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.target }}
          path: packages/python/dist/*.whl

  python-publish:
    needs: python-build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # ── Node.js package (loadable extension) ────────────────────────
  node-publish:
    needs: build-ext
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Download all platform extensions into the Node package
      - uses: actions/download-artifact@v4
        with:
          name: ext-x86_64-unknown-linux-gnu
          path: artifacts/linux-x64
      - uses: actions/download-artifact@v4
        with:
          name: ext-aarch64-unknown-linux-gnu
          path: artifacts/linux-arm64
      - uses: actions/download-artifact@v4
        with:
          name: ext-x86_64-apple-darwin
          path: artifacts/darwin-x64
      - uses: actions/download-artifact@v4
        with:
          name: ext-aarch64-apple-darwin
          path: artifacts/darwin-arm64

      - name: Copy platform extensions into package
        run: |
          cp artifacts/linux-x64/turbolite-x86_64-unknown-linux-gnu.so \
            packages/node/turbolite.linux-x64.so
          cp artifacts/linux-arm64/turbolite-aarch64-unknown-linux-gnu.so \
            packages/node/turbolite.linux-arm64.so
          cp artifacts/darwin-x64/turbolite-x86_64-apple-darwin.dylib \
            packages/node/turbolite.darwin-x64.dylib
          cp artifacts/darwin-arm64/turbolite-aarch64-apple-darwin.dylib \
            packages/node/turbolite.darwin-arm64.dylib
          # Copy CLI binary (linux x64 for npx)
          cp artifacts/linux-x64/turbolite-cli-x86_64-unknown-linux-gnu \
            packages/node/turbolite
          chmod +x packages/node/turbolite

      - name: Install dependencies and build TypeScript
        working-directory: packages/node
        run: npm install && npx tsc

      - name: List package contents
        working-directory: packages/node
        run: |
          echo "=== Extension binaries ==="
          ls -lh turbolite.* 2>/dev/null || echo "none"
          echo "=== Dist ==="
          ls -lh dist/

      - name: Publish to npm
        working-directory: packages/node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
