app = "cinch-tiered-bench"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  RUST_LOG = "warn"
  BENCH_VERBOSE = "1"

[mounts]
  source = "bench_data"
  destination = "/data"

[processes]
  app = "--sizes 1000000 --page-size 65536 --ppg 128 --import auto --force --iterations 5 --warmup 1 --modes none,interior,index,data"

[[vm]]
  size = "performance-8x"
  memory = "16384"
