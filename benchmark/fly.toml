app = "cinch-tiered-bench"
primary_region = "iad"

[build]
  dockerfile = "benchmark/Dockerfile"

[env]
  RUST_LOG = "warn"

[mounts]
  source = "bench_data"
  destination = "/data"

[processes]
  app = "--sizes 1000000 --iterations 5 --skip-verify --import auto"

[[vm]]
  size = "performance-8x"
  memory = "16384"
